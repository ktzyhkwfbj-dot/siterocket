services:
  - type: web
    name: siterocket
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUDINARY_URL
        sync: false   # you paste this in Render dashboard — never commit secrets
      - key: MONGODB_URI
        sync: false   # same
